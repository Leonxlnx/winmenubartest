<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>WinUsage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="state-collapsed">
  <div class="notch" id="notch">
    <div class="notch-bg"></div>

    <!-- Collapsed view: row of provider icons with progress rings -->
    <div class="collapsed" id="collapsed-view"></div>

    <!-- Expanded view -->
    <div class="expanded" id="expanded-view">
      <header class="head">
        <strong class="head-title">AI Usage</strong>
        <div class="head-actions">
          <button class="head-btn" id="btn-open-file" title="Open providers.json" aria-label="Open file">
            <svg viewBox="0 0 24 24" class="ic"><path d="M4 6h10l2 3h4v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </button>
          <button class="head-btn" id="btn-position" title="Toggle dock position" aria-label="Position">
            <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="4" width="18" height="3.5" rx="1.5" fill="currentColor"/><rect x="3" y="16.5" width="18" height="3.5" rx="1.5" fill="currentColor" opacity="0.45"/></svg>
          </button>
          <button class="head-btn" id="btn-collapse" title="Collapse" aria-label="Collapse">
            <svg viewBox="0 0 24 24" class="ic"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
        </div>
      </header>

      <div class="provider-list" id="provider-list"></div>

      <footer class="foot">
        <span class="foot-version">WinUsage 0.1</span>
        <span class="foot-hint" id="foot-hint">Edit providers.json to add more</span>
      </footer>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
