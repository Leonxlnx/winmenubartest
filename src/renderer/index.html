<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'self'" />
  <title>WinUsage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="state-collapsed">
  <div class="notch" id="notch">
    <div class="notch-bg"></div>

    <!-- Collapsed: row of provider icons -->
    <div class="collapsed" id="collapsed-view"></div>

    <!-- Expanded: provider cards -->
    <div class="expanded" id="expanded-view">
      <header class="head">
        <div class="head-left">
          <span class="head-title">AI Usage</span>
          <span class="head-status" id="head-status"></span>
        </div>
        <div class="head-actions">
          <button class="head-btn" id="btn-refresh" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 24 24" class="ic"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 4v6h-6l2.3-2.3A6 6 0 1 0 18 12" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="head-btn" id="btn-collapse" title="Collapse" aria-label="Collapse">
            <svg viewBox="0 0 24 24" class="ic"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
        </div>
      </header>

      <div class="provider-list" id="provider-list"></div>

      <footer class="foot">
        <span class="foot-version">WinUsage 0.2</span>
        <span class="foot-source" id="foot-source">source: <span id="foot-source-name">openusage @ 127.0.0.1:6736</span></span>
      </footer>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
