<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>WinMenuBar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark">
  <div class="bar" id="bar">
    <!-- LEFT: identity -->
    <div class="cluster cluster-left">
      <button class="item logo" data-menu="apple" data-key="showApple" aria-label="System">
        <svg viewBox="0 0 24 24" class="logo-svg" aria-hidden="true">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
      </button>
      <button class="item app-name" data-menu="app" data-key="showAppName"><strong id="app-name-label">WinBar</strong></button>
    </div>

    <!-- CENTER: menus -->
    <div class="cluster cluster-center" data-key="showMenus">
      <button class="item" data-menu="file">File</button>
      <button class="item" data-menu="edit">Edit</button>
      <button class="item" data-menu="view">View</button>
      <button class="item" data-menu="window">Window</button>
      <button class="item" data-menu="help">Help</button>
    </div>

    <!-- RIGHT: status -->
    <div class="cluster cluster-right">
      <button class="item icon-only" id="btn-spotlight" data-key="showSpotlight" aria-label="Spotlight">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M15 15 L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="item icon-only" id="btn-controlcenter" data-key="showControlCenter" aria-label="Control Center">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <rect x="3" y="4" width="8" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <rect x="13" y="4" width="8" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="13" width="8" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <rect x="13" y="13" width="8" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>

      <button class="item icon-only" id="btn-bluetooth" data-key="showBluetooth" aria-label="Bluetooth">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <path d="M8 6 L16 12 L8 18 L8 6 M8 12 L16 6 L16 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="item battery" id="btn-battery" data-key="showBattery" aria-label="Battery">
        <span class="battery-pct" id="battery-pct">—</span>
        <span class="battery-icon">
          <span class="battery-shell">
            <span class="battery-fill" id="battery-fill" style="width: 60%"></span>
          </span>
          <span class="battery-tip"></span>
        </span>
      </button>

      <button class="item icon-only" id="btn-wifi" data-key="showWifi" aria-label="Wi-Fi">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <path d="M2 8.5C5 5.5 9 4 12 4s7 1.5 10 4.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M5 12C7 10 9.5 9 12 9s5 1 7 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 15.5C9.2 14.5 10.5 14 12 14s2.8 .5 4 1.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="12" cy="19" r="1.2" fill="currentColor"/>
        </svg>
      </button>

      <button class="item icon-only" id="btn-volume" data-key="showVolume" aria-label="Volume">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <path d="M4 9V15H7L12 19V5L7 9H4Z" fill="currentColor"/>
          <path d="M15 8.5C16.2 9.5 17 10.7 17 12s-.8 2.5-2 3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M17 6C19 7.5 20 9.6 20 12s-1 4.5-3 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="item clock" id="btn-clock" data-key="showClock" aria-label="Date & time">
        <span id="clock-time">--:--</span>
      </button>

      <span class="divider" aria-hidden="true"></span>

      <button class="item icon-only gear" id="btn-settings" aria-label="Customize">
        <svg viewBox="0 0 24 24" class="ic" aria-hidden="true">
          <path d="M19.43 12.98l1.86-1.43-1.5-2.59-2.2.85a7.92 7.92 0 0 0-1.6-.93l-.34-2.34h-3l-.34 2.34c-.58.23-1.12.54-1.6.93l-2.2-.85-1.5 2.59 1.86 1.43c-.06.34-.1.69-.1 1.05s.04.71.1 1.05l-1.86 1.43 1.5 2.59 2.2-.85c.48.39 1.02.7 1.6.93l.34 2.34h3l.34-2.34c.58-.23 1.12-.54 1.6-.93l2.2.85 1.5-2.59-1.86-1.43c.06-.34.1-.69.1-1.05s-.04-.71-.1-1.05Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="12" cy="14" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Dropdown panel (rendered absolutely) -->
  <div class="dropdown" id="dropdown" hidden>
    <div class="dropdown-inner" id="dropdown-inner"></div>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settings-panel" hidden></div>

  <script src="settings-panel.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
