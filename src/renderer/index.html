<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>WinNotch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="state-collapsed">
  <div class="notch" id="notch">
    <!-- Collapsed view -->
    <div class="collapsed" id="collapsed-view">
      <span class="status-dot" id="status-dot"></span>
      <span class="logo">
        <svg viewBox="0 0 24 24" class="logo-svg" aria-hidden="true">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
      </span>
      <span class="collapsed-text" id="collapsed-text">Codex</span>
      <span class="collapsed-sep">•</span>
      <span class="collapsed-meta" id="collapsed-meta">no tasks</span>
    </div>

    <!-- Expanded view -->
    <div class="expanded" id="expanded-view">
      <header class="expanded-head">
        <div class="head-left">
          <span class="status-dot" id="status-dot-expanded"></span>
          <strong>Codex Tasks</strong>
          <span class="head-count" id="head-count"></span>
        </div>
        <div class="head-right">
          <button class="head-btn" id="btn-add" aria-label="Add task" title="Add task">
            <svg viewBox="0 0 24 24" class="ic"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="head-btn" id="btn-open-file" aria-label="Open tasks.json" title="Open tasks.json">
            <svg viewBox="0 0 24 24" class="ic"><path d="M4 6h10l2 3h4v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </button>
          <button class="head-btn" id="btn-clear" aria-label="Clear finished" title="Clear finished">
            <svg viewBox="0 0 24 24" class="ic"><path d="M5 7h14M9 7V5h6v2m-7 0v12h8V7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
          <button class="head-btn" id="btn-collapse" aria-label="Collapse" title="Collapse">
            <svg viewBox="0 0 24 24" class="ic"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
        </div>
      </header>

      <div class="task-list" id="task-list"></div>

      <footer class="expanded-foot">
        <span class="foot-hint">Edit <code id="tasks-file-hint">tasks.json</code> to add tasks from outside</span>
      </footer>
    </div>
  </div>

  <!-- Add-task modal -->
  <div class="add-modal" id="add-modal" hidden>
    <div class="add-modal-card">
      <strong>New task</strong>
      <input type="text" id="add-title" placeholder="What's running?" />
      <div class="add-actions">
        <button class="btn-secondary" id="add-cancel">Cancel</button>
        <button class="btn-primary" id="add-confirm">Add</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
